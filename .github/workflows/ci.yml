name: ci

# sqlo1-only changes skip this workflow and run the fast sqlo1 one instead;
# a PR touching both trees still runs both.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'engine/sqlo1/**'
      - 'engine/sqlo1a/**'
      - 'engine/sqlo1b/**'
      - 'cmd/sqlo1srv/**'
      - 'cmd/sqlo1crash/**'
      - 'labs/sqlo1/**'
      - 'scripts/sqlo1-import-boundary.sh'
      - '.github/workflows/sqlo1.yml'
  pull_request:
    paths-ignore:
      - 'engine/sqlo1/**'
      - 'engine/sqlo1a/**'
      - 'engine/sqlo1b/**'
      - 'cmd/sqlo1srv/**'
      - 'cmd/sqlo1crash/**'
      - 'labs/sqlo1/**'
      - 'scripts/sqlo1-import-boundary.sh'
      - '.github/workflows/sqlo1.yml'

permissions:
  contents: read

# Cancel an in-flight run when a branch is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test on Linux and macOS with the race detector on. gofmt and vet
  # run here too so a formatting slip fails fast on both platforms.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: f3 import boundary
        run: ./scripts/f3-import-boundary.sh
      - name: test
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      # Rerun the network-facing suites on the epoll reactor driver. AKI_NET
      # is the suite-wide override in server_test.go, the same pattern as
      # AKI_CONN_SHAPE; Linux only because the reactor only exists there.
      - name: test with the reactor net driver
        if: matrix.os == 'ubuntu-latest'
        env:
          AKI_NET: reactor
        run: go test -race -count=1 ./f3srv/... ./engine/f3/...
      # Same rerun on the io_uring driver. Where the runner's kernel or
      # sandbox denies io_uring the suite still runs, on the logged goroutine
      # fallback, and wantNetDriver keeps the driver assertions honest.
      - name: test with the uring net driver
        if: matrix.os == 'ubuntu-latest'
        env:
          AKI_NET: uring
        run: go test -race -count=1 ./f3srv/... ./engine/f3/...
      - name: coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -func=coverage.out | tail -1

  # Run the suite with the debug build tag so the after-every-commit invariants in
  # assert_debug.go are exercised in CI: no page left pinned, and page accounting
  # balanced (no leak, no double reference, no live page on the freelist). These
  # checks are compiled out of release builds, so without this job they would only
  # ever run on a developer's machine.
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: test with debug assertions
        run: go test -tags debug -race -count=1 ./...

  # Keep the no-cgo, static-binary stance honest. The whole point of the f-series
  # servers is a single static binary you can scp anywhere, so a stray import "C"
  # or an external module creeping into their graph should fail the build, not get
  # noticed at release time. The zero-dependency check used to be "no go.sum at
  # all", but the sqlo1 driver brought its SQLite driver into the module, so the
  # stance is per tree now: the f-series import graph stays standard library only.
  purego:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: no cgo imports
        run: |
          # Match a cgo import line (import "C" or a bare "C" inside an import
          # block) without tripping on ordinary string literals like "C".
          hits=$(grep -rlnE --include='*.go' '^[[:space:]]*(import[[:space:]]+)?"C"[[:space:]]*(//.*)?$' . || true)
          if [ -n "$hits" ]; then
            echo "cgo is not allowed, these files import \"C\":"
            echo "$hits"
            exit 1
          fi
      - name: f-series stays on the standard library
        run: |
          # An external module path has a dot in its first element (github.com,
          # golang.org); stdlib packages never do. Anything left after dropping
          # this module's own packages is a dependency that slipped in.
          mod=$(go list -m)
          ext=$(go list -deps ./engine/f1raw/... ./engine/f2raw/... ./engine/f3/... ./f1srv/... ./f2srv/... ./f3srv/... ./cmd/f1srv ./cmd/f2srv ./cmd/f3srv | grep -v "^$mod" | grep -E '^[^/]*\.[^/]*/' || true)
          if [ -n "$ext" ]; then
            echo "the f-series import graph must stay standard library only:"
            echo "$ext"
            exit 1
          fi
      - name: builds with cgo disabled
        env:
          CGO_ENABLED: 0
        run: go build ./...

  # golangci-lint bundles staticcheck, govet, ineffassign, errcheck, unused and
  # more, so it is the main quality gate.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  # Scan the module and its dependencies for known vulnerabilities.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Confirm go.mod and go.sum are tidy: a PR that adds an import without running
  # go mod tidy fails here instead of breaking a later release.
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
